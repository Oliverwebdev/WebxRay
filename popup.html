<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>WEBXRAY</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="wx-popup">
    <div class="wx-popup-header">
      <span class="wx-popup-logo">WEBXRAY</span>
      <span class="wx-popup-tagline">See the invisible web.</span>
    </div>

    <button id="wx-open-panel" class="wx-popup-btn wx-popup-btn--primary">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M15 3v18"/>
      </svg>
      Open Visualization
    </button>

    <div id="wx-popup-stats" class="wx-popup-stats wx-popup-stats--loading">
      <span>Loading…</span>
    </div>

    <div class="wx-popup-footer">
      <span class="wx-popup-version">v1.0.0</span>
      <span class="wx-popup-divider">·</span>
      <a class="wx-popup-link" href="https://github.com/Oliverwebdev" target="_blank" rel="noopener">GitHub</a>
    </div>
  </div>

  <script type="module" src="popup.js"></script>
</body>
</html>
